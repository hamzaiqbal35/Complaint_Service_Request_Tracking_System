services:
  - type: web
    name: csrts-app
    env: php
    plan: free
    buildCommand: "./render-build.sh"
    startCommand: "php artisan serve --host=0.0.0.0 --port=$PORT"
    envVars:
      - key: APP_NAME
        value: "Complaint Tracking System"
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: csrts-db
          property: connectionString

databases:
  - name: csrts-db
    plan: free
    databaseName: csrts
    user: csrts_user
